<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <header>
      <nav class="navigation">
        <a href="index.html" class="home"
          ><img src="./assets/icons/header/home.png" alt="Home" />Home</a
        >
        <a class="discover discover-active"
          ><img
            src="./assets/icons/header/selected/discover.png"
            alt="Discover"
          />Discover</a
        >
        <a
          href="/search.html"
          class="search"
          onclick="selectIcon(this, '.navigation a')"
          ><img src="./assets/icons/header/search.png" alt="Search" />Search</a
        >
      </nav>
      <ul class="top-buttons">
        <li>
          <img
            src="/assets/icons/header/notification.png"
            alt="notifications"
          />
        </li>
        <li><img src="/assets/icons/header/private.png" alt="private" /></li>
        <li class="friends">
          <a href="friends.html"
            ><img src="/assets/icons/header/friends.png" alt="friends"
          /></a>
        </li>
        <li><img src="/assets/icons/header/settings.png" alt="settings" /></li>
        <li>
          <img
            src="/assets/icons/header/light-dark-mode.png"
            alt="light-dark-mode"
          />
        </li>
      </ul>
    </header>
    <aside class="sidebar">
      <ul class="sidebar-wrapper">
        <li>
          <a href="/library.html" class="library"
            ><img src="./assets/icons/header/library.png" alt="library" /> My
            Library</a
          >
        </li>
        <li>
          <a><img src="/assets/icons/sidebar/pins.png" alt="pins" /> Pins</a
          ><img
            class="arrow-icon"
            src="assets/icons/sidebar/arrow.png"
            alt="arrow-icon"
          />
        </li>
        <li>
          <a>
            <img
              src="/assets/icons/sidebar/playlists.png"
              alt="Playlists"
            />Playlists</a
          ><img
            class="arrow-icon"
            src="assets/icons/sidebar/arrow.png"
            alt="arrow-icon"
          />
        </li>
        <li>
          <a href="library-liked.html">
            <img src="assets/icons/sidebar/liked-songs.png" alt="liked songs" />
            Liked songs</a
          >
        </li>
        <li>
          <a> <img src="assets/icons/sidebar/saves.png" alt="Saves" /> Saves</a>
        </li>
        <li>
          <a>
            <img src="assets/icons/sidebar/albums.png" alt="Albums" />
            Albums</a
          >
        </li>
        <li>
          <a>
            <img
              src="assets/icons/sidebar/folders.png"
              alt="Folders"
            />Folders</a
          >
        </li>
        <li>
          <a>
            <img src="assets/icons/sidebar/podcasts.png" alt="Podcasts" />
            Podcasts</a
          >
        </li>
        <li>
          <a>
            <img src="assets/icons/sidebar/audiobooks.png" alt="Audiobooks" />
            Audiobooks</a
          >
        </li>
        <li>
          <a>
            <img
              src="assets/icons/sidebar/artists.png"
              alt="Artists"
            />Artists</a
          >
        </li>
      </ul>
    </aside>
    <main>
      <div class="main-wrapper wrapper-for-discover">
        <section class="menu-buttons buttons-for-discover">
          <ul>
            <li class="music-active"><a>Music</a></li>
            <li><a>EDM</a></li>
            <li><a>Indie</a></li>
            <li><a>Pop</a></li>
            <li><a>Rock</a></li>
            <li><a>Alt Rock</a></li>
            <li><a>Country</a></li>
            <li><a>R&B</a></li>
            <li><a>Hip-Hop</a></li>
            <li><a>Podcast</a></li>
            <li><a>Audiobooks</a></li>
          </ul>
          <img src="assets/icons/header/switch.png" alt="switch" />
        </section>
      </div>
      <section class="player">
        <div class="audio-settings">
          <button id="playBtn">
            <img src="/assets/icons/player/player-pause.png" alt="Play" />
          </button>
          <button>
            <img src="/assets/icons/player/player-leftarrow.png" alt="Prev" />
          </button>
          <button>
            <img src="/assets/icons/player/player-rightarrow.png" alt="Next" />
          </button>
          <button>
            <img src="/assets/icons/player/player-shuffle.png" alt="Shuffle" />
          </button>
          <button>
            <img src="/assets/icons/player/player-repeat.png" alt="Repeat" />
          </button>
          <button>
            <img src="/assets/icons/player/player-timer.png" alt="timer" />
          </button>

          <audio
            id="audio"
            src="Jefferson-Airplane-White-Rabbit-_Official-Audio_.mp3"
          ></audio>

          <button>
            <img src="/assets/icons/player/player-sound.png" alt="Volume" />
          </button>
        </div>

        <div class="player-song">
          <div class="player-song-cover">
            <img
              src="assets/images/player/white-rabbit.jpeg"
              alt="white rabbit"
            />
            <div>
              <h4>White Rabbit</h4>
              <p>Jefferson Airplane</p>
            </div>
          </div>
          <div class="player-song-buttons">
            <button>
              <img
                src="/assets/icons/player/player-like.png"
                alt="add to liked songs"
              />
            </button>
            <button>
              <img
                src="assets/icons/player/player-add.png"
                alt="add music to your album"
              />
            </button>
            <button>
              <img src="assets/icons/player/player-lyrics.png" alt="lyrics" />
            </button>
            <button>
              <img src="assets/icons/player/player-pc.png" alt="pc" />
            </button>
            <button>
              <img src="assets/icons/player/player-more.png" alt="more" />
            </button>
          </div>
        </div>
        <div class="player-last-section">
          <button>
            <img alt="" src="assets/icons/player/player-line.png" />
          </button>
          <button>
            <img alt="" src="assets/icons/player/player-dj.png" />
          </button>
          <button>
            <img alt="" src="assets/icons/player/player-queue.png" />
          </button>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <header>
      <nav class="navigation">
        <a class="home" onclick="selectIcon(this, '.navigation a')"
          ><img src="./assets/icons/header/home.png" alt="Home" />Home</a
        >
        <a class="discover" onclick="selectIcon(this, '.navigation a')"
          ><img
            src="./assets/icons/header/discover.png"
            alt="Discover"
          />Discover</a
        >
        <a class="search" onclick="selectIcon(this, '.navigation a')"
          ><img src="./assets/icons/header/search.png" alt="Search" />Search</a
        >
      </nav>
      <ul class="top-buttons">
        <li>
          <img
            src="/assets/icons/header/notification.png"
            alt="notifications"
          />
        </li>
        <li><img src="/assets/icons/header/private.png" alt="private" /></li>
        <li class="friends">
          <img src="/assets/icons/header/friends.png" alt="friends" />
        </li>
        <li><img src="/assets/icons/header/settings.png" alt="settings" /></li>
        <li>
          <img
            src="/assets/icons/header/light-dark-mode.png"
            alt="light-dark-mode"
          />
        </li>
      </ul>
    </header>
    <aside class="sidebar">
      <ul class="sidebar-wrapper">
        <li>
          <a class="library"
            ><img src="./assets/icons/header/library.png" alt="library" /> My
            Library</a
          >
        </li>
        <li>
          <a><img src="/assets/icons/sidebar/pins.png" alt="pins" /> Pins</a
          ><img
            class="arrow-icon"
            src="assets/icons/sidebar/arrow.png"
            alt="arrow-icon"
          />
        </li>
        <li>
          <a>
            <img
              src="/assets/icons/sidebar/playlists.png"
              alt="Playlists"
            />Playlists</a
          ><img
            class="arrow-icon"
            src="assets/icons/sidebar/arrow.png"
            alt="arrow-icon"
          />
        </li>
        <li>
          <a>
            <img src="assets/icons/sidebar/liked-songs.png" alt="liked songs" />
            Liked songs</a
          >
        </li>
        <li>
          <a> <img src="assets/icons/sidebar/saves.png" alt="Saves" /> Saves</a>
        </li>
        <li>
          <a>
            <img src="assets/icons/sidebar/albums.png" alt="Albums" />
            Albums</a
          >
        </li>
        <li>
          <a>
            <img
              src="assets/icons/sidebar/folders.png"
              alt="Folders"
            />Folders</a
          >
        </li>
        <li>
          <a>
            <img src="assets/icons/sidebar/podcasts.png" alt="Podcasts" />
            Podcasts</a
          >
        </li>
        <li>
          <a>
            <img src="assets/icons/sidebar/audiobooks.png" alt="Audiobooks" />
            Audiobooks</a
          >
        </li>
        <li>
          <a>
            <img
              src="assets/icons/sidebar/artists.png"
              alt="Artists"
            />Artists</a
          >
        </li>
      </ul>
    </aside>
    <main></main>
    <footer></footer>
  </body>
</html>
